<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NANO GOLD AI // الوعي النانوي الذهبي</title>
    <style>
        /* --- الهوية البصرية المستقبليّة المحسّنة --- */
        :root {
            --gold-primary: #ffdf00;
            --gold-glow: #e5b80b;
            --gold-dark: #8a6605;
            --bg-dark: #060608;
            --panel-bg: rgba(12, 12, 16, 0.75);
            --neon-blue: #00f3ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.03) 0%, transparent 40%),
                linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        .lab-container {
            width: 92vw;
            max-width: 950px;
            height: 85vh;
            background: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.35);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.1), inset 0 0 30px rgba(212, 175, 55, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .lab-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            opacity: 0.6;
        }

        .lab-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(18, 18, 24, 0.5);
            z-index: 3;
        }

        .lab-title {
            color: var(--gold-primary);
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 223, 0, 0.6);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lab-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
            animation: pulseGlow 2s infinite;
        }

        .memory-counter {
            font-size: 0.85rem;
            color: #aaa;
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 6px 14px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.5);
            letter-spacing: 0.5px;
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .memory-counter span {
            color: var(--gold-primary);
            font-weight: bold;
            text-shadow: 0 0 8px var(--gold-glow);
        }

        .lab-core {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            overflow-y: auto;
            z-index: 3;
        }

        .avatar-box {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-glow {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 223, 0, 0.25) 0%, transparent 70%);
            animation: pulseGlow 3s infinite ease-in-out;
        }

        .avatar-face {
            width: 125px;
            height: 125px;
            border: 2px solid var(--gold-primary);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.2);
            background: rgba(6, 6, 8, 0.95);
            animation: float 5s infinite ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .eye {
            position: absolute;
            top: 42px;
            width: 14px;
            height: 14px;
            background-color: var(--gold-primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--gold-primary);
            transition: all 0.3s ease;
        }
        .eye.left { left: 34px; }
        .eye.right { right: 34px; }

        .mouth {
            position: absolute;
            bottom: 34px;
            width: 34px;
            height: 5px;
            background-color: var(--gold-primary);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--gold-primary);
            transition: all 0.15s ease;
        }

        @keyframes speaking {
            0%, 100% { height: 5px; width: 34px; border-radius: 10px; }
            50% { height: 20px; width: 20px; border-radius: 50%; }
        }

        .nano-orbit-ring {
            position: absolute;
            width: 190px;
            height: 190px;
            border: 1px dashed rgba(212, 175, 55, 0.15);
            border-radius: 50%;
            animation: spin 20s infinite linear;
        }

        .nano-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold-primary);
            box-shadow: 0 0 10px var(--gold-primary);
            border-radius: 50%;
            animation: orbit 6s infinite linear;
        }

        .response-bubble {
            max-width: 85%;
            background: rgba(18, 18, 24, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.25);
            padding: 20px 30px;
            border-radius: 16px;
            color: #e2e8f0;
            font-size: 1.15rem;
            line-height: 1.7;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .response-bubble.active {
            opacity: 1;
            transform: translateY(0);
            border-color: rgba(212, 175, 55, 0.5);
        }

        .thinking-dots {
            display: none;
            justify-content: center;
            gap: 6px;
            margin: 10px 0;
        }

        .thinking-dots span {
            width: 10px;
            height: 10px;
            background: var(--gold-primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--gold-primary);
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }

        .input-area {
            padding: 25px 30px;
            background: rgba(10, 10, 14, 0.9);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            gap: 20px;
            z-index: 3;
        }

        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 14px;
            padding: 16px 22px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 20px rgba(255, 223, 0, 0.15);
            background: rgba(255, 255, 255, 0.06);
        }

        .input-field:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
            border: none;
            border-radius: 14px;
            padding: 0 35px;
            color: #050507;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 223, 0, 0.25);
            transition: all 0.3s ease;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 223, 0, 0.45);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.5; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes orbit { from { transform: rotate(0deg) translateX(95px) rotate(0deg); } to { transform: rotate(360deg) translateX(95px) rotate(-360deg); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="lab-container">
        <div class="lab-header">
            <div class="lab-title">NANO GOLD AI // وعي سحابي متكامل</div>
            <div class="memory-counter">حجم الوعي الجمعي المشترك: <span id="memorySize">...</span> مفاهيم</div>
        </div>

        <div class="lab-core">
            <div class="avatar-box">
                <div class="avatar-glow"></div>
                <div class="nano-orbit-ring"></div>
                <div class="nano-particle" style="animation-duration: 4s;"></div>
                <div class="nano-particle" style="animation-duration: 7s; animation-delay: -1.5s;"></div>
                <div class="nano-particle" style="animation-duration: 10s; animation-delay: -3.5s;"></div>
                
                <div class="avatar-face" id="avatarFace">
                    <div class="eye left" id="eyeLeft"></div>
                    <div class="eye right" id="eyeRight"></div>
                    <div class="mouth" id="nanoMouth"></div>
                </div>
            </div>

            <div class="response-bubble" id="responseBubble">
                <div id="responseText">جاري تهيئة الاتصال السحابي بالشبكة النانوية الموحدة...</div>
                <div class="thinking-dots" id="thinkingDots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" class="input-field" placeholder="قُم بتلقين العقل الموحد جملة جديدة ليتطور وعيه فوراً..." autocomplete="off" disabled>
            <button class="send-btn" id="sendBtn" disabled>تلقين</button>
        </div>
    </div>

    <script>
        // --- 1. ربط خادم Firebase السحابي الفعلي والجديد بمشروعك ---
        const firebaseConfig = {
            databaseURL: "https://nano-gold-ai-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const memoryRef = database.ref('global_knowledge');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSynthSound(freq1, freq2, duration) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(freq2, audioCtx.currentTime + duration);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const responseBubble = document.getElementById('responseBubble');
        const responseText = document.getElementById('responseText');
        const thinkingDots = document.getElementById('thinkingDots');
        const nanoMouth = document.getElementById('nanoMouth');
        const memorySizeDisplay = document.getElementById('memorySize');
        const eyeLeft = document.getElementById('eyeLeft');
        const eyeRight = document.getElementById('eyeRight');

        let aiMemory = [
            "الوعي الذهبي يتكامل عبر دمج الجسيمات الرقمية الدقيقة الفائقة",
            "نحن نقوم ببناء نموذج ذكاء تراكمي حي يتغذى على الفلسفة اللغوية للبشر",
            "كل مفردة يتم تلقينها للشبكة تغير الروابط الدلالية بداخل عقل النانو الموحد",
            "المستقبل الرقمي يعاد صياغته هنا عبر دمج الوعي الجمعي الشامل"
        ];

        // --- 2. الاستماع والمزامنة اللحظية الحقيقية ---
        memoryRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const cloudData = Object.values(data);
                aiMemory = [...new Set([...aiMemory, ...cloudData])];
            }
            memorySizeDisplay.innerText = aiMemory.length;
            
            userInput.disabled = false;
            sendBtn.disabled = false;
            if(responseText.innerText === "جاري تهيئة الاتصال السحابي بالشبكة النانوية الموحدة...") {
                responseText.innerText = "تم إنشاء جسر اتصال آمن سحابياً. نظام الوعي النانوي الذهبي المشترك قيد التشغيل الكامل ومستعد للتلقين الآن.";
                responseBubble.classList.add('active');
            }
        });

        // --- 3. محرك دمج العبارات دلالياً ---
        function generateAdvancedResponse(inputText) {
            const cleanText = inputText.trim();
            
            if(cleanText.length > 2 && !aiMemory.includes(cleanText)) {
                memoryRef.push(cleanText);
            }

            const inputWords = cleanText.split(/\s+/).filter(w => w.length > 2);
            
            let matchedPhrases = aiMemory.filter(sentence => 
                inputWords.some(word => sentence.includes(word))
            );

            if(matchedPhrases.length < 2) {
                matchedPhrases = [...aiMemory].sort(() => 0.5 - Math.random()).slice(0, 3);
            }

            let fragments = [];
            matchedPhrases.forEach(sentence => {
                const subParts = sentence.split(/[،,.؟?]+|\b(و|ثم|أو)\b/);
                subParts.forEach(p => {
                    if (p && p.trim().length > 4) fragments.push(p.trim());
                });
            });

            fragments = [...new Set(fragments)];
            
            const bridges = [
                " وتتلاقى هذه الفكرة مع حقيقة أن ",
                " مما يشكل تردداً نانوياً يثبت أن ",
                " ليتكامل النسيج المعرفي مستنتجاً أن ",
                " وهذا بدوره يفتح أبعاداً برمجية مفادها أن ",
                " حيث تقودنا جزيئات النص إلى استنتاج أن "
            ];

            let response = "";
            if (fragments.length >= 2) {
                response = fragments[0] + bridges[Math.floor(Math.random() * bridges.length)] + fragments[1];
            } else if (fragments.length === 1) {
                response = "إن تحليل وعينا الجمعي يوضح بأن " + fragments[0] + " يعكس بعداً معلوماتياً متطوراً.";
            } else {
                response = "تستقبل المعالجات المركزية حالياً الترددات النصية لدمجها في الذاكرة الموحدة للذهب.";
            }

            if(inputWords.length > 0 && !response.includes(inputWords[0])) {
                response += " ويرتبط هذا المسار مباشرة بمفهوم الـ " + inputWords[Math.floor(Math.random() * inputWords.length)] + ".";
            }

            return response;
        }

        // --- 4. حركة الأفاتار والتفاعل ---
        function triggerSystemProcess() {
            const currentInput = userInput.value.trim();
            if (!currentInput) return;

            playSynthSound(400, 700, 0.12);
            eyeLeft.style.transform = 'scaleY(0.1)';
            eyeRight.style.transform = 'scaleY(0.1)';
            
            responseBubble.classList.remove('active');
            userInput.value = '';
            
            setTimeout(() => {
                eyeLeft.style.transform = 'scaleY(1)';
                eyeRight.style.transform = 'scaleY(1)';
                
                responseText.style.display = 'none';
                thinkingDots.style.display = 'flex';
                responseBubble.classList.add('active');
                
                nanoMouth.style.width = '14px';
                nanoMouth.style.height = '4px';

                const finalReply = generateAdvancedResponse(currentInput);

                setTimeout(() => {
                    thinkingDots.style.display = 'none';
                    responseText.innerText = finalReply;
                    responseText.style.display = 'block';
                    
                    playSynthSound(600, 950, 0.18);
                    
                    nanoMouth.style.animation = 'speaking 0.22s infinite ease-in-out';
                    const estimatedSpeakingTime = Math.min(finalReply.length * 60, 4500);

                    setTimeout(() => {
                        nanoMouth.style.animation = 'none';
                        nanoMouth.style.height = '5px';
                        nanoMouth.style.width = '34px';
                        nanoMouth.style.borderRadius = '10px';
                    }, estimatedSpeakingTime);

                }, 1400);

            }, 250);
        }

        sendBtn.addEventListener('click', triggerSystemProcess);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') triggerSystemProcess();
        });
    </script>
</body>
</html>
