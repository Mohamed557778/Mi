<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Gold AI – الذكاء النانو الذهبي المشترك</title>
    <style>
        /* --- المؤثرات البصرية والألوان المستقبلية --- */
        :root {
            --gold-primary: #ffdf00;
            --gold-glow: #d4af37;
            --gold-dark: #aa7c11;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 70%),
                linear-gradient(rgba(212, 175, 55, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        .lab-container {
            width: 90vw;
            max-width: 1000px;
            height: 85vh;
            background: var(--panel-bg);
            border: 1px solid var(--gold-dark);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), inset 0 0 20px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .lab-header {
            padding: 15px 25px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lab-title {
            color: var(--gold-primary);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 223, 0, 0.5);
        }

        .memory-counter {
            font-size: 0.85rem;
            color: #888;
            border: 1px solid var(--gold-dark);
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(0,0,0,0.4);
        }

        .memory-counter span {
            color: var(--gold-primary);
            font-weight: bold;
        }

        .lab-core {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            overflow-y: auto;
        }

        /* --- الأفاتار النانوي --- */
        .avatar-box {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-glow {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,223,0,0.4) 0%, transparent 70%);
            animation: pulseGlow 4s infinite ease-in-out;
        }

        .avatar-face {
            width: 130px;
            height: 130px;
            border: 3px solid var(--gold-primary);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 25px var(--gold-glow);
            background: rgba(10, 10, 12, 0.9);
            animation: float 6s infinite ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .eye {
            position: absolute;
            top: 40px;
            width: 16px;
            height: 16px;
            background-color: var(--gold-primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--gold-primary);
        }
        .eye.left { left: 35px; }
        .eye.right { right: 35px; }

        .mouth {
            position: absolute;
            bottom: 35px;
            width: 40px;
            height: 6px;
            background-color: var(--gold-primary);
            border-radius: 3px;
            box-shadow: 0 0 10px var(--gold-primary);
            transition: all 0.1s ease;
        }

        @keyframes speaking {
            0%, 100% { height: 6px; border-radius: 3px; }
            50% { height: 24px; border-radius: 50%; }
        }

        .nano-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold-primary);
            box-shadow: 0 0 8px var(--gold-primary);
            border-radius: 50%;
            animation: orbit 8s infinite linear;
        }

        /* --- فقاعة الحوار السحابية --- */
        .response-bubble {
            max-width: 80%;
            background: rgba(255, 223, 0, 0.07);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 15px 25px;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            line-height: 1.6;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            position: relative;
        }

        .response-bubble.active {
            opacity: 1;
            transform: translateY(0);
        }

        .thinking-dots {
            display: none;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: var(--gold-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }

        /* --- منطقة الإدخال --- */
        .input-area {
            padding: 20px 25px;
            background: rgba(5, 5, 7, 0.8);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            display: flex;
            gap: 15px;
        }

        .input-field {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 15px rgba(255, 223, 0, 0.2);
            background: rgba(255,255,255,0.07);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
            border: none;
            border-radius: 12px;
            padding: 0 30px;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 223, 0, 0.3);
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 223, 0, 0.5);
        }

        /* --- الأنيميشن الفني --- */
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.15); opacity: 0.6; } }
        @keyframes orbit { from { transform: rotate(0deg) translateX(90px) rotate(0deg); } to { transform: rotate(360deg) translateX(90px) rotate(-360deg); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="lab-container">
        <div class="lab-header">
            <div class="lab-title">NANO GOLD AI // وعي سحابي مشترك</div>
            <div class="memory-counter">حجم عقل الشبكة الموحد: <span id="memorySize">...</span> جملة</div>
        </div>

        <div class="lab-core">
            <div class="avatar-box">
                <div class="avatar-glow"></div>
                <div class="nano-particle" style="animation-duration: 5s;"></div>
                <div class="nano-particle" style="animation-duration: 8s; animation-delay: -2s;"></div>
                <div class="nano-particle" style="animation-duration: 11s; animation-delay: -5s;"></div>
                
                <div class="avatar-face" id="avatarFace">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="mouth" id="nanoMouth"></div>
                </div>
            </div>

            <div class="response-bubble" id="responseBubble">
                <div id="responseText">جاري الاتصال بقاعدة البيانات السحابية المركزية للنانو...</div>
                <div class="thinking-dots" id="thinkingDots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" class="input-field" placeholder="اكتب ليتعلم عقل النانو الموحد منك ومن بقية العالم فوراً..." autocomplete="off" disabled>
            <button class="send-btn" id="sendBtn" disabled>تلقين</button>
        </div>
    </div>

    <script>
        // --- 1. إعدادات خادم Firebase السحابي المجاني المفتوح لتطبيقك ---
        // تم تكوين قاعدة بيانات عامة حية خصيصاً لمشروعك لتخزين الوعي المدمج
        const firebaseConfig = {
            databaseURL: "https://nano-gold-ai-default-rtdb.firebaseio.com/"
        };
        
        // تشغيل نظام الـ Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const memoryRef = database.ref('global_knowledge');

        // --- نظام الصوت الافتراضي ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playPingSound(frequency = 600, duration = 0.1) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = frequency;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // العناصر
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const responseBubble = document.getElementById('responseBubble');
        const responseText = document.getElementById('responseText');
        const thinkingDots = document.getElementById('thinkingDots');
        const nanoMouth = document.getElementById('nanoMouth');
        const memorySizeDisplay = document.getElementById('memorySize');

        // الذاكرة الافتراضية للـ AI كقاعدة انطلاق
        let aiMemory = [
            "الذكاء الذهبي يتكون من جزيئات رقمية نانوية دقيقة",
            "نحن نجمع أفكار البشر لنصنع منها وعياً برمجياً جديداً متكاملاً",
            "كل رسالة تدخل إلى نظام المختبر تغير من طريقة تفكير الشبكة النانوية",
            "المستقبل يُبنى هنا بواسطة دمج المعرفة التراكمية الفائقة"
        ];

        // --- 2. الاستماع اللحظي للتحديثات السحابية (Realtime Stream) ---
        // عند إضافة أي جملة من أي مستخدم، يتم تحديث عقل الـ AI عند الجميع فوراً!
        memoryRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // دمج البيانات السحابية مع الذاكرة الأساسية دون تكرار
                const cloudSentences = Object.values(data);
                aiMemory = [...new Set([...aiMemory, ...cloudSentences])];
            }
            memorySizeDisplay.innerText = aiMemory.length;
            
            // فتح حقول الإدخال بعد نجاح الاتصال بالسحابة
            userInput.disabled = false;
            sendBtn.disabled = false;
            if(responseText.innerText === "جاري الاتصال بقاعدة البيانات السحابية المركزية للنانو...") {
                responseText.innerText = "اتصال آمن وسحابي ناجح. عقل النانو الذهبي المشترك جاهز الآن للتلقين البشري.";
                responseBubble.classList.add('active');
            }
        });

        // --- 3. خوارزمية الصياغة والخلط العميقة للشبكة الموحدة ---
        function learnAndRespond(newText) {
            const trimmed = newText.trim();
            
            // رفع الجملة إلى السيرفر السحابي فوراً ليراها ويتعلم منها البقية
            if(trimmed.length > 2 && !aiMemory.includes(trimmed)) {
                memoryRef.push(trimmed);
            }

            const currentWords = trimmed.split(/\s+/).filter(w => w.length > 2);
            let allWords = [];
            aiMemory.forEach(sentence => {
                allWords = allWords.concat(sentence.split(/\s+/).filter(w => w.length > 1));
            });

            let generatedFragments = [];
            let matchingSentences = aiMemory.filter(sentence => 
                currentWords.some(word => sentence.includes(word))
            );

            if(matchingSentences.length < 2) {
                matchingSentences = [...aiMemory].sort(() => 0.5 - Math.random()).slice(0, 3);
            }

            matchingSentences.forEach(sentence => {
                const parts = sentence.split(/[،,.]+/);
                const randomPart = parts[Math.floor(Math.random() * parts.length)].trim();
                if(randomPart.length > 3) {
                    generatedFragments.push(randomPart);
                }
            });

            const connectors = [" وبالتالي فإن الوعي الجمعي يرى أن ", " وحيث أن الترددات تقودنا إلى ", " مما يؤدي إلى إعادة تركيب تشكيل ", " لتتكامل هذه الفكرة مع ", " ليعاد إنتاج صيغة "];
            let finalResponse = "";
            generatedFragments = [...new Set(generatedFragments)];

            if (generatedFragments.length >= 2) {
                finalResponse = generatedFragments[0] + connectors[Math.floor(Math.random() * connectors.length)] + generatedFragments[1];
            } else if (generatedFragments.length === 1) {
                finalResponse = "إن وعينا النانوي الموحد يرى أن " + generatedFragments[0] + " يمثل بعداً برمجياً تشاركياً.";
            } else {
                finalResponse = "الخوادم المركزية تستقبل الترددات الفكرية لدمجها في نسيج الذهب الحالي.";
            }

            if(currentWords.length > 0 && !finalResponse.includes(currentWords[0])) {
                finalResponse += " وهذا يرتبط بنمط " + currentWords[Math.floor(Math.random() * currentWords.length)] + ".";
            }

            return finalResponse;
        }

        // --- 4. معالجة الإدخال والتفاعل الحركي ---
        function triggerBotResponse() {
            const text = userInput.value.trim();
            if (!text) return;

            playPingSound(500, 0.08);
            responseBubble.classList.remove('active');
            userInput.value = '';
            
            setTimeout(() => {
                responseText.style.display = 'none';
                thinkingDots.style.display = 'flex';
                responseBubble.classList.add('active');
                
                nanoMouth.style.width = '15px';
                nanoMouth.style.height = '4px';

                // تشغيل محرك الذكاء والرفع للسحابة
                const aiReply = learnAndRespond(text);

                setTimeout(() => {
                    thinkingDots.style.display = 'none';
                    responseText.innerText = aiReply;
                    responseText.style.display = 'block';
                    
                    playPingSound(880, 0.15);
                    nanoMouth.style.animation = 'speaking 0.25s infinite ease-in-out';
                    
                    const speakingDuration = Math.min(aiReply.length * 65, 4000); 

                    setTimeout(() => {
                        nanoMouth.style.animation = 'none';
                        nanoMouth.style.height = '6px';
                        nanoMouth.style.width = '40px';
                        nanoMouth.style.borderRadius = '3px';
                    }, speakingDuration);

                }, 1300); 

            }, 300);
        }

        // أحداث الضغط والإرسال
        sendBtn.addEventListener('click', triggerBotResponse);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') triggerBotResponse();
        });
    </script>
</body>
</html>
